name: CI

on:
  push:
    branches: [main, master, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check tracked skill mirror drift
        run: node scripts/skill-drift-check.mjs --tier ci

      - name: Type check
        run: npm run typecheck

      - name: Build CLI
        run: npm run build

      - name: Verify CLI binary
        run: node dist/cli.js --help

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    env:
      CTX_INSTANCE_ID: ci-test
      CTX_ORG: testorg
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install dashboard dependencies
        run: npm ci --prefix dashboard

      - name: Run unit tests
        run: npm test

      - name: Run setup-hooks shell tests
        run: bash tests/setup-hooks.test.sh

      - name: Run codex parity tests
        run: npm run test:codex

      # SSN-redaction JS↔python parity must be CI-enforced: the python redactor
      # (mmrag.py) and the differential fuzz had no CI step, so a python-side edit
      # could silently desync the two redactors. ubuntu-latest ships python3 and
      # mmrag.py imports only stdlib, so this needs no setup-python / pip install.
      - name: Run SSN python parity tests (corpus + set/label drift-guards)
        run: python3 knowledge-base/scripts/test_scrub_ssn.py

      - name: Run JS↔python SSN differential parity fuzz
        run: npx tsx scripts/ssn-parity-fuzz.ts

  dashboard-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      # Build-only credentials. Configure CI_AUTH_SECRET and CI_ADMIN_PASSWORD
      # in repo settings (Settings > Secrets and variables > Actions) to override.
      # Fallback values are only used for local build/typecheck and must never
      # be used in production environments.
      AUTH_SECRET: ${{ secrets.CI_AUTH_SECRET || 'ci-fallback-do-not-use-in-prod' }}
      AUTH_TRUST_HOST: 'true'
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD || 'ci-fallback' }}
      CTX_INSTANCE_ID: ci-test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dashboard dependencies
        run: npm ci

      - name: Type check dashboard
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build
